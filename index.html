<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lawrence Jay Portfolio</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            border: 2px solid white;
            transition: all 0.3s ease;
            margin: 0 10px;
        }

        .btn:hover {
            background: white;
            color: #667eea;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Welcome to Lawrence Jay's Portfolio</h1>
        <p>Choose which version you'd like to explore:</p>
        <a href="/portfolio-main/website/html/index.html" class="btn">Main Portfolio</a>
        <a href="/portfolio-main/portfolio/index.html" class="btn">Simple Portfolio</a>
    </div>
</body>


</html>
